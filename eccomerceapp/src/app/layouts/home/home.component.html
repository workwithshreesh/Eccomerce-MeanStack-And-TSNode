<app-header></app-header>

<section class="container mt-5">
    <h3 class="fw-bold">Featured Categories</h3>
    <div class="row">
        <div class="col-md-2 col-6 p-2">
            <div class="card shadow-sm">
                <img src="path_to_image" class="card-img-top" alt="Category">
                <div class="card-body text-center">
                    <h5 class="card-title">Product Name</h5>
                    <!-- Add to Cart Button -->
                    <button class="btn btn-primary w-100 mb-2">Add to Cart</button>
                    <!-- Buy Now Button -->
                    <button class="btn btn-success w-100">Buy Now</button>
                </div>
            </div>
        </div>
        <!-- Repeat this block for more products if needed -->
    </div>
</section>

<!-- Modal -->
<div class="modal fade" id="cartModal" tabindex="-1" aria-labelledby="cartModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="cartModalLabel">Shopping Cart</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p>Your cart is empty.</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-success">Checkout</button>
            </div>
        </div>
    </div>
</div>
